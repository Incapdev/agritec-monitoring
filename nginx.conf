resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: DEV environment ────────────────────────
    location /proxy/dev/ucgagent/ {
        set $dev_ucgagent ucgagent-dev-api;
        rewrite ^/proxy/dev/ucgagent/(.*)$ /$1 break;
        proxy_pass http://$dev_ucgagent:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/dev/diary/ {
        set $dev_diary infocapdiary-dev-api;
        rewrite ^/proxy/dev/diary/(.*)$ /$1 break;
        proxy_pass http://$dev_diary:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/dev/unified/ {
        set $dev_unified unified-dev-ui;
        rewrite ^/proxy/dev/unified/(.*)$ /$1 break;
        proxy_pass http://$dev_unified:80;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Proxy: UAT environment ────────────────────────
    location /proxy/uat/ucgagent/ {
        set $uat_ucgagent ucgagent-uat-api;
        rewrite ^/proxy/uat/ucgagent/(.*)$ /$1 break;
        proxy_pass http://$uat_ucgagent:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/uat/diary/ {
        set $uat_diary infocapdiary-uat-api;
        rewrite ^/proxy/uat/diary/(.*)$ /$1 break;
        proxy_pass http://$uat_diary:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/uat/unified/ {
        set $uat_unified unified-uat-ui;
        rewrite ^/proxy/uat/unified/(.*)$ /$1 break;
        proxy_pass http://$uat_unified:80;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Log file serving (mounted volumes) ──────────
    location /logs/ucgagent-dev/ {
        alias /logs/ucgagent-dev/;
        autoindex on;
        autoindex_format json;
    }

    location /logs/diary-dev/ {
        alias /logs/diary-dev/;
        autoindex on;
        autoindex_format json;
    }

    location /logs/ucgagent-uat/ {
        alias /logs/ucgagent-uat/;
        autoindex on;
        autoindex_format json;
    }

    location /logs/diary-uat/ {
        alias /logs/diary-uat/;
        autoindex on;
        autoindex_format json;
    }

    # Version endpoint
    location /version {
        return 200 '{"app":"agritec-monitor","version":"1.0.0"}';
        add_header Content-Type application/json;
    }
}
