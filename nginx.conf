server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy: DEV environment ────────────────────────
    # Agritec V2 API (DEV)
    location /proxy/dev/agritec/ {
        proxy_pass http://agritec-dev-api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Agritec V2 UI check (DEV)
    location /proxy/dev/agritec-ui/ {
        proxy_pass http://agritec-dev-ui:80/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # UCG Agent API (DEV)
    location /proxy/dev/ucgagent/ {
        proxy_pass http://ucgagent-dev-api:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Diary API (DEV)
    location /proxy/dev/diary/ {
        proxy_pass http://infocapdiary-dev-api:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Unified UI (DEV)
    location /proxy/dev/unified/ {
        proxy_pass http://unified-dev-ui:80/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Proxy: UAT environment ────────────────────────
    location /proxy/uat/agritec/ {
        proxy_pass http://agritec-uat-api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/uat/agritec-ui/ {
        proxy_pass http://agritec-uat-ui:80/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /proxy/uat/ucgagent/ {
        proxy_pass http://ucgagent-uat-api:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/uat/diary/ {
        proxy_pass http://infocapdiary-uat-api:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/uat/unified/ {
        proxy_pass http://unified-uat-ui:80/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Proxy: PROD environment ───────────────────────
    location /proxy/prod/agritec/ {
        proxy_pass http://agritec-prod-api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/prod/agritec-ui/ {
        proxy_pass http://agritec-prod-ui:80/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /proxy/prod/ucgagent/ {
        proxy_pass http://ucgagent-prod-api:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/prod/diary/ {
        proxy_pass http://infocapdiary-prod-api:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /proxy/prod/unified/ {
        proxy_pass http://unified-prod-ui:80/;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Version endpoint
    location /version {
        return 200 '{"app":"agritec-monitor","version":"1.0.0"}';
        add_header Content-Type application/json;
    }
}
